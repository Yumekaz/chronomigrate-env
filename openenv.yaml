version: "1.0"
name: "chronomigrate-env"
description: "AI agent executes zero-downtime database schema migrations under simulated transactional load."
tasks:
  - id: "easy_add_column"
    description: "Add two defaulted columns without causing downtime."
    difficulty: easy
    max_steps: 5
    grader: "grade/task_easy"
  - id: "medium_rename_fk"
    description: "Rename a primary-key column and repair foreign key references safely."
    difficulty: medium
    max_steps: 10
    grader: "grade/task_medium"
  - id: "hard_repartition"
    description: "Repartition a large table under load using a safe multi-step migration."
    difficulty: hard
    max_steps: 20
    grader: "grade/task_hard"
action_space:
  type: discrete
  commands:
    - wait
    - execute_sql
observation_space:
  type: text
  format: json
reward_range: [0.0, 1.0]
