spec_version: 1
name: chronomigrate-env
type: space
version: 0.1.0
description: >
  An RL environment that trains AI agents to execute zero-downtime
  database schema migrations under simulated transactional load.
  Agents are scored on schema correctness, data integrity, and
  operational availability, not just whether the migration succeeded.
action: MigrationAction
observation: MigrationObservation
state: MigrationState
mcp_enabled: false
runtime: docker
app: server.app:app
port: 7860
tags:
  - openenv
  - database
  - reinforcement-learning
  - zero-downtime
  - schema-migration
tasks:
  - id: easy_add_column
    difficulty: easy
    max_steps: 5
    grader:
      type: python
      callable: server.tasks.task_easy:easy_grader
      entrypoint: server.tasks.task_easy:easy_grader
  - id: medium_rename_fk
    difficulty: medium
    max_steps: 10
    grader:
      type: python
      callable: server.tasks.task_medium:medium_grader
      entrypoint: server.tasks.task_medium:medium_grader
  - id: hard_repartition
    difficulty: hard
    max_steps: 20
    grader:
      type: python
      callable: server.tasks.task_hard:hard_grader
      entrypoint: server.tasks.task_hard:hard_grader
